<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arqo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #1E1E1E; padding-bottom: 70px; }
        #search-wrapper { display: flex; align-items: center; position: relative; }
        #search-input {
            width: 0; opacity: 0; transition: all 0.4s ease-in-out;
            border-radius: 4px; border: none; outline: none;
            color: black; font-size: 0.875rem; background-color: white;
            position: absolute; right: 0;
        }
        .search-active #search-button { transform: translateX(-160px); }
        .search-active #search-input { width: 150px; opacity: 1; padding: 4px 10px; }
        #search-button { transition: transform 0.4s ease-in-out; z-index: 10; }
    </style>
</head>
<body class="text-white">

    <header class="border-b border-gray-800 bg-[#1E1E1E] sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex flex-col items-start">
                <div class="w-8 h-8 border-2 border-white flex items-center justify-center font-bold text-xl">M</div>
                <span class="text-lg font-black tracking-tighter">ARQO</span>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="search-wrapper">
                    <button id="search-button" class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></button>
                    <input type="text" id="search-input" placeholder="Buscar manga...">
                </div>
                <button class="bg-white text-black px-4 py-1.5 rounded text-sm font-bold">Iniciar sesión</button>
            </div>
        </div>
    </header>

    <main class="p-6 space-y-6 max-w-xl mx-auto">
        <section class="bg-[#D9D9D9] rounded-xl p-8 text-center border border-gray-400">
            <p class="text-black/40 font-bold text-[10px] tracking-[0.3em] mb-12">ESPACIO PUBLICITARIO</p>
            <h1 class="text-4xl font-black text-black leading-tight">Premio Arqo:<br><span class="text-[#D4AF37]">Narrativa Gráfica</span></h1>
            <p class="text-black font-bold text-xs mt-4">$20,000 MXN AL PRIMER LUGAR + SERIALIZACIÓN</p>
        </section>

        <button class="w-full bg-[#D9D9D9] py-10 rounded-xl text-black font-bold text-xl border border-gray-400">Bases y requisitos</button>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#1E1E1E] border-t border-gray-800 flex justify-around items-center py-3 z-50">
        <button class="flex flex-col items-center gap-1 opacity-50">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[10px] font-bold">Inicio</span>
        </button>
        <button class="flex flex-col items-center gap-1">
            <span class="text-[#D4AF37] font-bold text-xs">Concurso</span>
        </button>
        <button class="flex flex-col items-center gap-1 opacity-50">
            <svg class="w-6 h-6 text-[#D4AF37]" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2L8 10c0 0 0 4 4 8s4-8 4-8L12 2zM12 13a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/>
            </svg>
            <span class="text-[10px] font-bold">Suscripción</span>
        </button>
    </nav>

    <footer class="bg-black py-12 px-6 text-center space-y-6 mb-16">
        <p class="text-gray-400 text-[10px] font-black tracking-[0.2em] uppercase">Una empresa de Multimedios</p>
        <div class="flex justify-center gap-8 text-gray-400 text-sm font-bold">
            <span>FB</span><span>IG</span><span>X</span>
        </div>
        <p class="text-gray-600 text-[10px] font-bold tracking-widest">DERECHOS RESERVADOS © ARQO 2026</p>
    </footer>

    <script>
        const btn = document.getElementById('search-button');
        const wrapper = document.getElementById('search-wrapper');
        btn.addEventListener('click', () => wrapper.classList.toggle('search-active'));
    </script>
</body>
</html>
